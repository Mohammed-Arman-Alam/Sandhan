<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandhan</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  .ubuntu{
    font-family: "Ubuntu", sans-serif;
  }
</style>
</head>
<body class="bg-black ubuntu">
    <section class="max-w-md min-h-screen mx-auto py-6 bg-[#FBC7A4]">
        <header>
            <div class="flex justify-center items-center mt-6">
                <div class="relative flex justify-center items-center  w-full">
                    <img class="w-60 p-0 scale-150 mx-auto -mb-10" src="logo.png" alt="">
                </div>
            </div>
        </header>
        <div>
            <div class="hero-content flex-col lg:flex-row-reverse">
              <div class="card bg-base-100 w-full max-w-sm shrink-0 ">
                <form class="card-body">
                  <fieldset class="fieldset">
                    <label class="fieldset-label">Mobile Number</label>
                    <input id="Mobile-number" class="rounded-3xl input" type="number" placeholder="Enter your number" required/>
                    <label class="fieldset-label">4 Digit Pin</label>
                    <input id="Pin-number" class="rounded-3xl input" type="password" placeholder="Enter 4 Digit Pin" required/>
                    <button id="login-btn" class="btn bg-[#F66B05] text-white mt-4 rounded-3xl">Login</button>
                  </fieldset>
                </form>
              </div>
            </div>
          </div>
         <footer>
            <h6 class="mx-auto w-[145px] text-4xl font-bold text-[#F66B05] mt-20">Sandhan</h6>
         </footer> 
    </section>
 <script src="login.js"></script>   
</body>
</html>
